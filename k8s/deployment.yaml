apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-scale-test
  labels:
    app: k8s-scale-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-scale-test
  template:
    metadata:
      labels:
        app: k8s-scale-test
    spec:
      containers:
        - name: app
          image: REPLACE_ME_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: READY_DELAY_MS
              value: "0"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
