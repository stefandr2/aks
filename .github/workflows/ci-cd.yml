name: ci-cd

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RG_NAME: aro
  LOCATION: swedencentral
  AKS_NAME: stefandr-aks
  ACR_NAME: stefandracr
  ACR_LOGIN_SERVER: stefandracr.azurecr.io
  IMAGE_NAME: k8s-scale-test
  LOAD_TEST_RESOURCE_NAME: stefandrtest
  APPINSIGHTS_NAME: aka-ai

jobs:
  build-deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login -n $ACR_NAME

      - name: Build and push image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG .
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG

      - name: AKS context
        run: az aks get-credentials -g $RG_NAME -n $AKS_NAME --overwrite-existing

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Set deployment image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          kubectl set image deployment/k8s-scale-test app=$ACR_LOGIN_SERVER/$IMAGE_NAME:$IMAGE_TAG
          kubectl rollout status deployment/k8s-scale-test

      - name: Wait for service IP
        run: |
          for i in {1..180}; do
            HOST=$(kubectl get svc k8s-scale-test -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [ -z "$HOST" ]; then
              HOST=$(kubectl get svc k8s-scale-test -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            fi
            if [ -n "$HOST" ]; then
              SVC_HOST=$HOST
              echo "SVC_HOST=$SVC_HOST" >> $GITHUB_ENV
              break
            fi
            sleep 10
          done
          if [ -z "$SVC_HOST" ]; then
            echo "Service endpoint not ready" >&2
            kubectl get svc k8s-scale-test -o wide >&2
            exit 1
          fi

      - name: Prepare load test config
        run: |
          SVC_HOST=$(echo "$SVC_HOST" | tr -d '\r\n' | xargs)
          SVC_HOST=${SVC_HOST#http://}
          SVC_HOST=${SVC_HOST#https://}
          SVC_HOST=${SVC_HOST%%/*}
          if [ -z "$SVC_HOST" ]; then
            echo "Service host is empty after sanitize" >&2
            exit 1
          fi
          AKS_ID=$(az aks show -g $RG_NAME -n $AKS_NAME --query id -o tsv)
          APPINSIGHTS_ID=$(az monitor app-insights component show -g $RG_NAME -a $APPINSIGHTS_NAME --query id -o tsv 2>/dev/null || true)
          if [ -z "$APPINSIGHTS_ID" ]; then
            az monitor app-insights component create -g $RG_NAME -a $APPINSIGHTS_NAME -l $LOCATION --application-type web
            APPINSIGHTS_ID=$(az monitor app-insights component show -g $RG_NAME -a $APPINSIGHTS_NAME --query id -o tsv)
          fi
          if [ -z "$AKS_ID" ]; then
            echo "AKS resource ID not found" >&2
            exit 1
          fi
          if [ -z "$APPINSIGHTS_ID" ]; then
            echo "App Insights resource ID not found" >&2
            exit 1
          fi
          sed -i "s/REPLACE_ME_HOST/$SVC_HOST/g" loadtest/azure-load-test.yaml
          sed -i "s|REPLACE_AKS_RESOURCE_ID|$AKS_ID|g" loadtest/azure-load-test.yaml
          sed -i "s|REPLACE_APPINSIGHTS_RESOURCE_ID|$APPINSIGHTS_ID|g" loadtest/azure-load-test.yaml
          sed -i "s|replace_aks_resource_id|$AKS_ID|g" loadtest/azure-load-test.yaml
          sed -i "s|replace_appinsights_resource_id|$APPINSIGHTS_ID|g" loadtest/azure-load-test.yaml

      - name: Run Azure Load Test
        uses: azure/load-testing@v1
        with:
          loadTestConfigFile: loadtest/azure-load-test.yaml
          resourceGroup: aro
          loadTestResource: stefandrtest
